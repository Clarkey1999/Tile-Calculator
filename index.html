<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pool Calc">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#03090f">
<title>Paradise Pools — Tile & Concrete Calculator</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#03090f;
  --s1:#07111c;
  --s2:#091520;
  --b1:rgba(255,255,255,0.055);
  --b2:rgba(255,255,255,0.10);
  --b3:rgba(0,160,255,0.22);
  --ac:#00aaff;
  --good:#00d48a;
  --warn:#f5a020;
  --cop:#7ab8d8;
  --conc:#b07844;
  --tx:#ddeeff;
  --tx2:#7aaccc;
  --tx3:#4a7898;
  --f:'Inter',system-ui,sans-serif;
  --m:ui-monospace,'Cascadia Code',Consolas,monospace;
  --r:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;}
body{
  min-height:100vh;font-family:var(--f);-webkit-font-smoothing:antialiased;
  color:var(--tx);background:var(--bg);
  background-image:
    radial-gradient(ellipse 1000px 500px at 65% -10%,rgba(0,80,170,.16) 0%,transparent 60%),
    radial-gradient(ellipse 500px 400px at -5% 85%,rgba(0,50,120,.11) 0%,transparent 55%);
  padding:18px 18px 60px;
  padding-top:max(18px,env(safe-area-inset-top));
  padding-right:max(18px,env(safe-area-inset-right));
  padding-bottom:max(60px,calc(40px + env(safe-area-inset-bottom)));
  padding-left:max(18px,env(safe-area-inset-left));
}

/* ── layout ── */
.wrap{max-width:1360px;margin:0 auto;display:flex;flex-direction:column;gap:13px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;align-items:start;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px;align-items:start;}
.g2i{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.g4i{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;}

/* ── card ── */
.card{
  background:linear-gradient(180deg,rgba(12,26,42,.98),rgba(6,15,25,.98));
  border:1px solid var(--b1);border-radius:var(--r);overflow:hidden;position:relative;
  box-shadow:0 4px 24px rgba(0,0,0,.48),0 1px 0 rgba(255,255,255,.04) inset,0 0 0 1px rgba(255,255,255,.01) inset;
  transition:border-color .22s,box-shadow .22s,transform .22s;
}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(120,195,255,.22),transparent);pointer-events:none;}
.card:hover{border-color:var(--b3);box-shadow:0 6px 30px rgba(0,0,0,.55),0 0 0 1px rgba(0,160,255,.05) inset;}
.pad{padding:17px 20px;}
.pad+.pad{border-top:1px solid var(--b1);}

/* ── section heading ── */
.sh{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:15px;}
.sh-l{display:flex;align-items:center;gap:8px;font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--tx2);}
.sh-bar{width:2px;height:12px;border-radius:1px;background:var(--ac);box-shadow:0 0 6px var(--ac);flex-shrink:0;}
.sh-r{font-family:var(--m);font-size:11px;font-weight:600;color:var(--ac);}
.sh-g{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--good);}
.sh-w{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--warn);}

/* ── header ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 24px;
  background:linear-gradient(135deg,rgba(10,26,48,.98),rgba(4,10,20,.99));
  border:1px solid var(--b2);border-radius:var(--r);position:relative;overflow:hidden;
  box-shadow:0 4px 30px rgba(0,0,0,.6),0 0 60px rgba(0,120,220,.06);
}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,180,255,.4),transparent);}
.logo{display:flex;align-items:center;gap:15px;}
.logo-img{height:82px;width:auto;object-fit:contain;filter:brightness(1.08) drop-shadow(0 2px 12px rgba(0,130,255,.26));}
.logo-fb{height:82px;width:82px;border-radius:16px;background:linear-gradient(145deg,#0090e0,#004a99);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 16px rgba(0,120,220,.4);}
.logo-fb svg{width:36px;height:36px;fill:none;stroke:#fff;stroke-width:1.8;}
.brand{display:flex;flex-direction:column;gap:4px;}
.brand-sub{font-size:10px;font-weight:600;letter-spacing:.24em;text-transform:uppercase;color:var(--tx3);}
.brand-name{font-size:26px;font-weight:800;letter-spacing:-.03em;line-height:1;background:linear-gradient(100deg,#fff 0%,#90d8ff 55%,var(--ac) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.top-btns{display:flex;gap:8px;flex-shrink:0;}

/* ── buttons ── */
.btn{font-family:var(--f);cursor:pointer;border:1px solid var(--b2);background:rgba(255,255,255,.04);color:var(--tx2);border-radius:9px;padding:9px 16px;font-size:12px;font-weight:600;letter-spacing:.02em;display:inline-flex;align-items:center;gap:7px;transition:all .16s;white-space:nowrap;box-shadow:0 1px 5px rgba(0,0,0,.22);}
.btn:hover{border-color:var(--b3);color:var(--tx);background:rgba(0,160,255,.07);}
.btn:active{transform:scale(.97);}
.btn svg{width:13px;height:13px;flex-shrink:0;}
.btn-p{background:linear-gradient(135deg,#0090e8,#004ea0);border-color:rgba(0,160,255,.35);color:#fff;box-shadow:0 2px 14px rgba(0,140,230,.28);}
.btn-p:hover{background:linear-gradient(135deg,#18a8ff,#0066cc);box-shadow:0 3px 18px rgba(0,160,255,.42);}

/* ── save bar ── */
.savebar{display:flex;align-items:center;gap:9px;flex-wrap:wrap;padding:10px 20px;background:rgba(0,160,255,.025);border-bottom:1px solid var(--b1);}
.save-label{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--tx3);}
.save-hint{font-size:10px;color:var(--tx3);margin-left:auto;}

/* ── fields ── */
.f{margin-bottom:12px;}.f:last-child{margin-bottom:0;}
.fl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2);margin-bottom:6px;}
.fh{font-size:10px;color:var(--tx3);margin-top:4px;line-height:1.5;}
input[type=number],input[type=text]{
  width:100%;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.08);border-radius:9px;
  color:var(--tx);font-size:14px;font-weight:600;padding:9px 13px;outline:none;font-family:var(--f);
  transition:border-color .16s,box-shadow .16s;
}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
input[type=number]{-moz-appearance:textfield;}
input:hover{border-color:rgba(0,160,255,.22);}
input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(0,170,255,.11);}
input::placeholder{color:var(--tx3);font-weight:400;}

/* ── row spinners ── */
.spin{display:flex;border:1px solid rgba(255,255,255,.09);border-radius:10px;overflow:hidden;height:42px;background:rgba(0,0,0,.3);transition:border-color .18s,box-shadow .18s;}
.spin:hover{border-color:rgba(0,160,255,.3);box-shadow:0 0 0 3px rgba(0,160,255,.05);}
.sb{min-width:42px;background:none;border:none;color:var(--tx3);font-size:19px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .14s;flex-shrink:0;font-family:var(--f);}
.sb:hover{background:rgba(0,160,255,.12);color:var(--ac);}
.sb:active{background:rgba(0,160,255,.22);transform:scale(.94);}
.sv{flex:1;min-width:36px;text-align:center;font-family:var(--m);font-weight:800;font-size:18px;color:var(--tx);background:rgba(0,160,255,.03);border-left:1px solid rgba(255,255,255,.07);border-right:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;transition:color .18s;}

/* ── toggles ── */
.tog{display:flex;align-items:center;gap:13px;border:1px solid rgba(255,255,255,.07);border-radius:11px;background:rgba(0,0,0,.22);padding:13px 16px;cursor:pointer;margin-bottom:8px;transition:all .18s;user-select:none;}
.tog:last-of-type{margin-bottom:0;}
.tog:hover{border-color:rgba(0,160,255,.24);background:rgba(0,160,255,.045);}
.tog.on{border-color:rgba(0,160,255,.4);background:linear-gradient(135deg,rgba(0,160,255,.1),rgba(0,160,255,.04));box-shadow:0 0 0 1px rgba(0,160,255,.08) inset;}
.tog.off{opacity:.26;pointer-events:none;}
.tog-dot{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .16s;}
.tog-dot::after{content:'';width:7px;height:7px;border-radius:50%;background:var(--ac);box-shadow:0 0 7px var(--ac);opacity:0;transform:scale(0);transition:all .18s;}
.tog.on .tog-dot{border-color:var(--ac);}
.tog.on .tog-dot::after{opacity:1;transform:scale(1);}
.tog-body{flex:1;}
.tog-title{font-size:13px;font-weight:600;color:var(--tx2);line-height:1.3;transition:color .16s;}
.tog.on .tog-title{color:var(--tx);}
.tog-sub{font-size:10px;color:var(--tx3);margin-top:2px;}

/* ── diagram card ── */
.diag-wrap{padding-bottom:0;}
.diag-head{display:flex;align-items:center;gap:8px;font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--tx2);margin-bottom:10px;}
.diag-head::before{content:'';width:2px;height:12px;border-radius:1px;background:var(--ac);box-shadow:0 0 5px var(--ac);flex-shrink:0;}
svg.pool{display:block;width:100%;height:auto;}
.diag-legend{display:flex;align-items:center;gap:18px;flex-wrap:wrap;padding:12px 20px 14px;border-top:1px solid var(--b1);}
.leg-item{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--tx2);font-weight:500;}
.leg-swatch{width:14px;height:14px;border-radius:4px;flex-shrink:0;border:1px solid rgba(255,255,255,.12);}

/* ── stat grid ── */
.sg{display:grid;gap:1px;background:rgba(0,0,0,.5);border-radius:13px;overflow:hidden;margin-bottom:12px;}
.sg3{grid-template-columns:repeat(3,1fr);}
.sc{background:rgba(5,13,23,.92);padding:16px 18px;}
.scl{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--tx2);margin-bottom:7px;}
.scv{font-size:28px;font-weight:800;font-family:var(--m);line-height:1;color:var(--tx);}
.scv .u{font-size:12px;font-weight:400;color:var(--tx2);margin-left:3px;}
.scs{font-size:10px;color:var(--tx2);margin-top:5px;font-family:var(--m);}

/* ── mini cells ── */
.m4{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(0,0,0,.5);border-radius:11px;overflow:hidden;}
.mc{background:rgba(5,13,23,.92);padding:12px 15px;}
.mcl{font-size:8.5px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--tx2);margin-bottom:4px;}
.mcv{font-size:20px;font-weight:800;font-family:var(--m);}
.mcv .u{font-size:10px;font-weight:400;color:var(--tx2);margin-left:3px;}
.mcs{font-size:10px;color:var(--tx2);margin-top:3px;font-family:var(--m);}
.mco{font-size:9px;color:var(--tx3);margin-top:2px;}

/* ── colors ── */
.hi{color:#55ccff!important;}
.co{color:var(--cop)!important;}
.cn{color:var(--conc)!important;}
.wn{color:var(--warn)!important;}

/* ── quote items ── */
.qs-items{display:grid;gap:1px;background:rgba(0,0,0,.5);border-radius:13px 13px 0 0;overflow:hidden;}
.qi{background:rgba(5,13,23,.92);padding:18px 22px;}
.qil{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--tx2);margin-bottom:5px;}
.qid{font-size:10px;color:var(--tx2);font-family:var(--m);margin-bottom:7px;line-height:1.6;}
.qiv{font-size:24px;font-weight:800;font-family:var(--m);color:var(--tx);}

/* ── total ── */
.qs-total{background:linear-gradient(135deg,rgba(0,55,120,.55),rgba(0,20,50,.82));border:1px solid rgba(0,160,255,.32);border-top:2px solid var(--ac);border-radius:0 0 13px 13px;padding:24px 28px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;position:relative;overflow:hidden;}
.qs-total::after{content:'';position:absolute;top:-50%;right:-10%;width:260px;height:260px;background:radial-gradient(circle,rgba(0,170,255,.14) 0%,transparent 70%);pointer-events:none;}
.qt-label{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--ac);margin-bottom:8px;}
.qt-detail{font-size:11px;color:var(--tx2);font-family:var(--m);line-height:2.1;}
.qt-val{font-size:46px;font-weight:900;font-family:var(--m);line-height:1;letter-spacing:-.025em;background:linear-gradient(130deg,#fff 0%,#a0e4ff 40%,var(--ac) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 22px rgba(0,180,255,.32));position:relative;z-index:1;}

/* ── trace ── */
.trace{font-family:var(--m);font-size:12px;color:var(--tx2);line-height:2.2;padding:16px 20px;background:rgba(0,0,0,.2);border-top:1px solid var(--b1);}
.trace b{color:var(--tx);font-weight:600;}
.th{color:#55ccff;font-weight:700;}.tc{color:var(--conc);font-weight:700;}.tw{color:var(--warn);font-weight:700;}

/* ── print ── */
@media print{
  body{background:#fff;color:#000;padding:0;background-image:none;}
  .no-print{display:none!important;}
  .card,.sc,.mc,.qi,.qs-total,.trace{background:#fff!important;border-color:#ccc!important;break-inside:avoid;box-shadow:none!important;}
  .scv,.qiv,.mcv,.brand-name,.qt-val{color:#000!important;-webkit-text-fill-color:#000!important;background:none!important;filter:none!important;}
  .hi{color:#005599!important;}.co{color:#7a5820!important;}.cn{color:#7a4010!important;}.wn{color:#a06000!important;}
  .qs-total{background:#e6f2ff!important;border-color:#0055bb!important;}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
/* ── Tablet ── */
@media(max-width:1000px){
  .g3{grid-template-columns:1fr 1fr;}
}
/* ── Large phone / small tablet ── */
@media(max-width:720px){
  .g3,.g2{grid-template-columns:1fr;}
  .g4i{grid-template-columns:1fr 1fr;}
  .topbar{flex-wrap:wrap;gap:10px;padding:12px 16px;}
  .top-btns{width:100%;}
  .brand-name{font-size:22px;}
  .logo-img{height:68px;}
  .logo-fb{height:68px;width:68px;}
  .qt-val{font-size:36px;}
  .sc{padding:13px 15px;}
  .scv{font-size:24px;}
  /* bigger touch targets on spinners */
  .spin{height:48px;}
  .sb{min-width:48px;font-size:22px;}
  .sv{font-size:20px;}
  .diag-legend{gap:12px;padding:10px 16px 12px;}
}
/* ── iPhone (390–430px) ── */
@media(max-width:480px){
  html{font-size:13px;}
  .g4i,.g2i{grid-template-columns:1fr;}
  .m4{grid-template-columns:1fr 1fr;}
  .brand-name{font-size:19px;}
  .logo-img{height:58px;}
  .logo-fb{height:58px;width:58px;}
  .qt-val{font-size:30px;}
  .scv{font-size:22px;}
  .spin{height:52px;}
  .sb{min-width:52px;font-size:24px;}
  .sv{font-size:22px;}
  .topbar{gap:8px;padding:10px 13px;}
  .qs-total{padding:16px 18px;gap:12px;}
  .qi{padding:14px 16px;}
  .pad{padding:14px 15px;}
  .tog{padding:11px 13px;}
}
/* ── Very small (SE, older Android) ── */
@media(max-width:360px){
  .brand-name{font-size:17px;}
  .logo-img{height:50px;}
  .top-btns .btn span{display:none;}
}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
var ROW_W=0.4;
var RATES={tile:470,conc:220,pour:1200,pump:1200};
function f2(n){return (+n).toFixed(2);}
function aud(n){return n.toLocaleString("en-AU",{minimumFractionDigits:2,maximumFractionDigits:2});}
function rLbl(n){return n==1?'1 Row':n+' Rows';}
function rLbl2(n){
  /* "2 Rows / 3 Total" — n additional rows + 1 coping row = total */
  if(n<=0) return '';
  var tot=n+1;
  return n+(n==1?' Row':' Rows')+' / '+tot+' Total';
}

var S={
  poolL:7.3,poolW:3.6,copingW:0.4,
  tile:{deep:0,shallow:0,sideA:0,sideB:0},
  conc:{deep:0,shallow:0,sideA:0,sideB:0},
  sep:false,pump:false
};

function calc(){
  var pL=S.poolL,pW=S.poolW,cW=S.copingW,ti=S.tile,co=S.conc;
  var watArea=pL*pW;
  var copOL=pL+cW*2,copOW=pW+cW*2,copArea=copOL*copOW-watArea;
  var tD=ti.deep*ROW_W,tS=ti.shallow*ROW_W,tA=ti.sideA*ROW_W,tB=ti.sideB*ROW_W;
  var tileOL=copOL+tD+tS,tileOW=copOW+tA+tB,tileArea=tileOL*tileOW-copOL*copOW;
  var cD=co.deep*ROW_W,cS=co.shallow*ROW_W,cA=co.sideA*ROW_W,cB=co.sideB*ROW_W;
  var concOL=tileOL+cD+cS,concOW=tileOW+cA+cB;
  var hasConc=co.deep+co.shallow+co.sideA+co.sideB>0;
  var concArea=hasConc?concOL*concOW-tileOL*tileOW:0;
  var tileCharge=tileArea*RATES.tile,concCharge=concArea*RATES.conc;
  var pourFee=hasConc&&S.sep?RATES.pour:0,pumpFee=S.pump?RATES.pump:0;
  var total=tileCharge+concCharge+pourFee+pumpFee;
  var tSides={deep:ti.deep*ROW_W*tileOW,shallow:ti.shallow*ROW_W*tileOW,sideA:ti.sideA*ROW_W*copOL,sideB:ti.sideB*ROW_W*copOL};
  var cSides={deep:co.deep*ROW_W*concOW,shallow:co.shallow*ROW_W*concOW,sideA:co.sideA*ROW_W*tileOL,sideB:co.sideB*ROW_W*tileOL};
  return{watArea:watArea,copOL:copOL,copOW:copOW,copArea:copArea,
    tD:tD,tS:tS,tA:tA,tB:tB,tileOL:tileOL,tileOW:tileOW,tileArea:tileArea,
    cD:cD,cS:cS,cA:cA,cB:cB,concOL:concOL,concOW:concOW,concArea:concArea,
    hasConc:hasConc,tileCharge:tileCharge,concCharge:concCharge,
    pourFee:pourFee,pumpFee:pumpFee,total:total,tSides:tSides,cSides:cSides};
}

function diagram(c){
  /* all coordinate helpers return numbers — no string arithmetic */
  var W=900,H=420,PAD=40;
  var oL=c.concOL,oW=c.concOW;
  var sc=Math.min((W-PAD*2)/oL,(H-PAD*2)/oW);
  var ox=(W-oL*sc)/2, oy=(H-oW*sc)/2;
  var pL=S.poolL,pW=S.poolW,cW=S.copingW;

  function sx(v){return ox+v*sc;}
  function sy(v){return oy+v*sc;}
  function sw(v){return v*sc;}
  function cx(x,w){return sx(x)+sw(w)/2;}
  function cy(y,h){return sy(y)+sw(h)/2;}
  function rct(x,y,w,h,a){return '<rect x="'+f2(sx(x))+'" y="'+f2(sy(y))+'" width="'+f2(sw(w))+'" height="'+f2(sw(h))+'" '+(a||'')+'/>';}
  function lbl(x,y,t,a){return '<text x="'+f2(x)+'" y="'+f2(y)+'" '+(a||'')+'>'+t+'</text>';}

  var oCX=c.cD+c.tD, oCY=c.cA+c.tA;
  var oPX=oCX+cW,    oPY=oCY+cW;
  var hasTile=S.tile.deep+S.tile.shallow+S.tile.sideA+S.tile.sideB>0;
  var s='';

  /* ── zone fills, outside-in: concrete → tile → coping → water ── */
  if(c.hasConc) s+=rct(0,0,oL,oW,'fill="#241008" rx="6"');
  if(hasTile)   s+=rct(c.cD,c.cA,c.tileOL,c.tileOW,'fill="#071c36" rx="3"');
  /* coping — richer, more saturated slate-blue so it visually separates from tile/water */
  s+=rct(oCX,oCY,c.copOL,c.copOW,'fill="url(#copg)" rx="2"');
  s+=rct(oPX,oPY,pL,pW,'fill="url(#wat)"');

  /* ── zone borders — glowing edges to match the rest of the page ── */
  if(c.hasConc) s+=rct(0,0,oL,oW,'fill="none" stroke="rgba(220,140,60,.5)" stroke-width="1.5" rx="6"');
  if(hasTile)   s+=rct(c.cD,c.cA,c.tileOL,c.tileOW,'fill="none" stroke="rgba(0,160,255,.45)" stroke-width="1.5" rx="3"');
  s+=rct(oCX,oCY,c.copOL,c.copOW,'fill="none" stroke="rgba(170,210,235,.55)" stroke-width="1.5" rx="2"');
  s+=rct(oPX,oPY,pL,pW,'fill="none" stroke="rgba(80,200,255,.75)" stroke-width="2"');
  /* fine inner highlight line on water for extra polish */
  s+=rct(oPX+1.2,oPY+1.2,Math.max(0,pL-2.4/sc*sc/sc),Math.max(0,pW-2.4/sc*sc/sc),'fill="none" stroke="rgba(255,255,255,.12)" stroke-width="1"');

  /* ── pool centre label ── */
  var ph=sw(pW), pw2=sw(pL);
  var FA='text-anchor="middle" font-family="Inter,sans-serif"';
  if(pw2>60&&ph>28){
    s+=lbl(cx(oPX,pL), sy(oPY)+ph/2-8,'POOL',FA+' fill="rgba(255,255,255,.92)" font-size="13" font-weight="700"');
    s+=lbl(cx(oPX,pL), sy(oPY)+ph/2+11,pL+'m × '+pW+'m',FA+' fill="rgba(150,220,255,.8)" font-size="11"');
  }

  /* ── Symmetrical edge labels — all 4 sides use the SAME style, inset from the water edge ──
     Deep/Shallow sit on the short (vertical) edges; Side A/B sit on the long (horizontal) edges.
     All four rendered identically for perfect symmetry. */
  var EDGE='font-family="Inter,sans-serif" font-size="8.5" font-weight="700" letter-spacing=".14em" fill="rgba(140,205,255,.5)"';
  if(pw2>110&&ph>36){
    s+=lbl(sx(oPX)+10,    sy(oPY)+ph/2+4, 'DEEP END',    EDGE+' text-anchor="start"');
    s+=lbl(sx(oPX+pL)-10, sy(oPY)+ph/2+4, 'SHALLOW END', EDGE+' text-anchor="end"');
  }
  if(pw2>90&&ph>34){
    s+=lbl(cx(oPX,pL), sy(oPY)+13,     'SIDE A', EDGE+' text-anchor="middle"');
    s+=lbl(cx(oPX,pL), sy(oPY+pW)-7,   'SIDE B', EDGE+' text-anchor="middle"');
  }

  /* ── Coping label — its own distinct callout so it reads as a real zone ── */
  if(c.copOL*sc>140){
    s+=lbl(sx(oCX)+10, sy(oCY)+13, 'COPING · INCLUDED',
      'font-family="Inter,sans-serif" font-size="8" font-weight="800" letter-spacing=".12em" fill="rgba(15,35,50,.62)" text-anchor="start"');
  }

  /* ── zone labels on additional rows — "N Rows / T Total" format, only when band is wide enough ── */
  var LBL='font-size="10" font-weight="800" font-family="Inter,sans-serif" text-anchor="middle"';
  function zoneLbl(show,bandPx,x,y,text,fill,rot){
    if(!show||bandPx<20||!text) return'';
    return lbl(x,y+4,text,LBL+' fill="'+fill+'"'+(rot?' transform="rotate(-90,'+f2(x)+','+f2(y)+')"':''));
  }
  /* tile bands */
  s+=zoneLbl(c.tD>0,sw(c.tD), cx(c.cD,c.tD),         cy(c.cA,c.tileOW), rLbl2(S.tile.deep),    '#7ad0ff',true);
  s+=zoneLbl(c.tS>0,sw(c.tS), cx(c.cD+c.tD+c.copOL,c.tS),cy(c.cA,c.tileOW),rLbl2(S.tile.shallow),'#7ad0ff',true);
  s+=zoneLbl(c.tA>0,sw(c.tA), cx(oCX,c.copOL),        cy(c.cA,c.tA),     rLbl2(S.tile.sideA),   '#7ad0ff',false);
  s+=zoneLbl(c.tB>0,sw(c.tB), cx(oCX,c.copOL),        cy(c.cA+c.tA+c.copOW,c.tB),rLbl2(S.tile.sideB),'#7ad0ff',false);
  /* concrete bands */
  s+=zoneLbl(c.cD>0,sw(c.cD), cx(0,c.cD),             cy(0,oW),          rLbl2(S.conc.deep),    '#f0b878',true);
  s+=zoneLbl(c.cS>0,sw(c.cS), cx(c.cD+c.tileOL,c.cS), cy(0,oW),          rLbl2(S.conc.shallow), '#f0b878',true);
  s+=zoneLbl(c.cA>0,sw(c.cA), cx(c.cD,c.tileOL),      cy(0,c.cA),        rLbl2(S.conc.sideA),   '#f0b878',false);
  s+=zoneLbl(c.cB>0,sw(c.cB), cx(c.cD,c.tileOL),      cy(c.cA+c.tileOW,c.cB),rLbl2(S.conc.sideB),'#f0b878',false);

  return '<svg class="pool" viewBox="0 0 '+W+' '+H+'">'
    +'<defs>'
    +'<linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">'
    +'<stop offset="0%" stop-color="#0e4a92"/><stop offset="100%" stop-color="#082e60"/>'
    +'</linearGradient>'
    +'<linearGradient id="copg" x1="0" y1="0" x2="0" y2="1">'
    +'<stop offset="0%" stop-color="#a8cfe8"/><stop offset="100%" stop-color="#8bb8d8"/>'
    +'</linearGradient>'
    +'<pattern id="wat" patternUnits="userSpaceOnUse" width="44" height="22">'
    +'<rect width="44" height="22" fill="url(#wg)"/>'
    +'<path d="M0 11 Q11 5 22 11 Q33 17 44 11" fill="none" stroke="rgba(100,190,255,.3)" stroke-width="1.2"/>'
    +'</pattern>'
    +'<filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">'
    +'<feGaussianBlur stdDeviation="2.2" result="blur"/>'
    +'<feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>'
    +'</filter>'
    +'</defs>'
    +'<rect width="'+W+'" height="'+H+'" fill="#040a12"/>'
    +'<g filter="url(#softglow)">'+s+'</g></svg>';
}

/* ── HTML helpers ── */
function spinH(path){
  var v=S,parts=path.split('.');
  for(var i=0;i<parts.length;i++) v=v[parts[i]];
  return '<div class="spin"><button class="sb" data-bump="'+path+':-0.5">&#8722;</button><div class="sv">'+v+'</div><button class="sb" data-bump="'+path+':0.5">+</button></div>';
}
function fld(lbl,inner,hint){return '<div class="f"><div class="fl">'+lbl+'</div>'+inner+(hint?'<div class="fh">'+hint+'</div>':'')+'</div>';}
function sh(left,right){return '<div class="sh"><div class="sh-l"><div class="sh-bar"></div>'+left+'</div>'+(right||'')+'</div>';}
function statCell(label,val,unit,sub,cls){
  return '<div class="sc"><div class="scl">'+label+'</div><div class="scv '+(cls||'')+'">'+val+'<span class="u">'+unit+'</span></div>'+(sub?'<div class="scs">'+sub+'</div>':'')+'</div>';
}
function miniCell(label,rows,area,cls){
  return '<div class="mc"><div class="mcl">'+label+'</div><div class="mcv '+(cls||'')+'">'+rows+'<span class="u">'+rLbl(rows).toLowerCase().replace(rows+'','').trim()+'</span></div><div class="mcs">'+f2(area)+' m²</div><div class="mco">'+(rows*400)+'mm out</div></div>';
}
function tog(label,sub,on,key){
  var off=key.indexOf(' off')>=0;
  return '<div class="tog'+(on?' on':'')+(off?' off':'')+'" data-tog="'+key.replace(' off','')+'">'
    +'<div class="tog-dot"></div>'
    +'<div class="tog-body"><div class="tog-title">'+label+'</div><div class="tog-sub">'+sub+'</div></div>'
    +'</div>';
}
function qItem(label,detail,val,col){
  return '<div class="qi"'+(col?' style="color:'+col+'"':'')+'>'
    +'<div class="qil">'+label+'</div><div class="qid">'+detail+'</div><div class="qiv">'+val+'</div></div>';
}

var ICO_P='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>';
var ICO_N='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';

function render(){
  var c=calc();
  var items=[];
  items.push(qItem("Additional Tile",f2(c.tileArea)+" m² × $"+RATES.tile+"/m²","$"+aud(c.tileCharge)));
  if(c.hasConc)        items.push(qItem("Plain Concrete",f2(c.concArea)+" m² × $"+RATES.conc+"/m²","$"+aud(c.concCharge),"var(--conc)"));
  if(c.hasConc&&S.sep) items.push(qItem("Separate Pour","One-off flat fee","$"+aud(c.pourFee),"var(--warn)"));
  if(S.pump)           items.push(qItem("Concrete Pump","One-off flat fee","$"+aud(c.pumpFee),"var(--warn)"));
  var iCols="repeat("+items.length+",1fr)";
  var tParts=["Tile&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;$"+aud(c.tileCharge)];
  if(c.hasConc)        tParts.push("Concrete&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;$"+aud(c.concCharge));
  if(c.hasConc&&S.sep) tParts.push("Sep. pour&nbsp;&nbsp;&nbsp;&nbsp;$"+aud(c.pourFee));
  if(S.pump)           tParts.push("Pump&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;$"+aud(c.pumpFee));
  var h="";

  /* ── header ── */
  h+='<div class="topbar">';
  h+='<div class="logo">';
  h+='<img class="logo-img" src="logo.png" alt="Paradise Pools" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">';
  h+='<div class="logo-fb" style="display:none"><svg viewBox="0 0 24 24"><path d="M3 18s2-3 5-3 6 4 9 4 5-3 5-3V6s-2 3-5 3-6-4-9-4-5 3-5 3z"/></svg></div>';
  h+='<div class="brand"><div class="brand-sub">Quote Calculator</div><div class="brand-name">Tile &amp; Concrete</div></div></div>';
  h+='<div class="top-btns no-print"><button class="btn" data-action="new">'+ICO_N+' New</button><button class="btn btn-p" data-action="print">'+ICO_P+' Print / PDF</button></div></div>';

  /* ── 3-col: pool+coping | tile | concrete ── */
  h+='<div class="g3">';

  /* pool shell + coping */
  h+='<div class="card"><div class="pad">'+sh("Pool Shell",'<span class="sh-g">Waterline</span>')+'<div class="g2i">';
  h+=fld("Length (m)",'<input type="number" step="0.1" value="'+S.poolL+'" data-num="poolL">');
  h+=fld("Width (m)",'<input type="number" step="0.1" value="'+S.poolW+'" data-num="poolW">');
  h+='</div></div><div class="pad">'+sh("Coping",'<span class="sh-g">Included</span>');
  h+=fld("Width (m)",'<input type="number" step="0.05" value="'+S.copingW+'" data-num="copingW">',"All 4 sides on waterline edge");
  h+='</div></div>';

  /* tile */
  h+='<div class="card"><div class="pad">'+sh("Additional Tile",'<span class="sh-r">$470 / m²</span>')+'<div class="g2i">';
  h+=fld("Deep End",spinH("tile.deep"),"rows × 400 mm");
  h+=fld("Shallow End",spinH("tile.shallow"),"rows × 400 mm");
  h+=fld("Side A",spinH("tile.sideA"),"rows × 400 mm");
  h+=fld("Side B",spinH("tile.sideB"),"rows × 400 mm");
  h+='</div></div></div>';

  /* concrete */
  h+='<div class="card"><div class="pad">'+sh("Plain Concrete",'<span class="sh-r">$220 / m²</span>')+'<div class="g2i">';
  h+=fld("Deep End",spinH("conc.deep"),"rows × 400 mm");
  h+=fld("Shallow End",spinH("conc.shallow"),"rows × 400 mm");
  h+=fld("Side A",spinH("conc.sideA"),"rows × 400 mm");
  h+=fld("Side B",spinH("conc.sideB"),"rows × 400 mm");
  h+='</div></div></div>';

  h+='</div>'; /* end g3 */

  /* ── full-width diagram ── */
  h+='<div class="card"><div class="pad diag-wrap"><div class="diag-head">Pool Layout — Top View</div>'+diagram(c)+'</div>';
  /* legend below diagram */
  h+='<div class="diag-legend">';
  h+='<div class="leg-item"><div class="leg-swatch" style="background:linear-gradient(180deg,#a8cfe8,#8bb8d8)"></div>Coping (included)</div>';
  h+='<div class="leg-item"><div class="leg-swatch" style="background:#1258a8"></div>Tile — $470/m²</div>';
  if(c.hasConc) h+='<div class="leg-item"><div class="leg-swatch" style="background:#1c0b03"></div>Concrete — $220/m²</div>';
  h+='</div></div>';

  /* ── 2-col: pour height | pump ── */
  h+='<div class="g2">';

  h+='<div class="card"><div class="pad">'+sh("Pour Height",'<span class="sh-r">$1,200 flat</span>');
  h+=tog("Same height as coping","Poured together — no extra fee",!S.sep,"sep:false"+(c.hasConc?"":" off"));
  h+=tog("Different height","Separate pour — $1,200 one-off fee",S.sep,"sep:true"+(c.hasConc?"":" off"));
  if(!c.hasConc) h+='<p class="fh" style="margin-top:9px">Add concrete rows above to enable</p>';
  h+='</div></div>';

  h+='<div class="card"><div class="pad">'+sh("Concrete Pump",'<span class="sh-r">$1,200 flat</span>');
  h+=tog("No pump required","Direct access — no extra charge",!S.pump,"pump:false");
  h+=tog("Concrete pump required","One-off flat fee of $1,200",S.pump,"pump:true");
  h+='</div></div>';

  h+='</div>'; /* end g2 */

  /* ── tile breakdown ── */
  h+='<div class="card"><div class="pad">'+sh("Additional Tile Breakdown",'<span class="sh-r">$470 / m²</span>');
  h+='<div class="sg sg3">';
  h+=statCell("Pool Waterline",f2(c.watArea),"m²",S.poolL+"m × "+S.poolW+"m","");
  h+=statCell("Coping (Included)",f2(c.copArea),"m²",f2(c.copOL)+"m × "+f2(c.copOW)+"m outer","co");
  h+=statCell("Additional Tile",f2(c.tileArea),"m²",f2(c.tileOL)+"m × "+f2(c.tileOW)+"m outer","hi");
  h+='</div><div class="m4">';
  h+=miniCell("Deep End",S.tile.deep,c.tSides.deep,"hi");
  h+=miniCell("Shallow End",S.tile.shallow,c.tSides.shallow,"hi");
  h+=miniCell("Side A",S.tile.sideA,c.tSides.sideA,"hi");
  h+=miniCell("Side B",S.tile.sideB,c.tSides.sideB,"hi");
  h+='</div></div></div>';

  /* ── concrete breakdown ── */
  if(c.hasConc){
    h+='<div class="card"><div class="pad">'+sh("Plain Concrete Breakdown",'<span class="sh-r">$220 / m²'+(S.sep?' + $1,200 pour':'')+'</span>');
    h+='<div class="sg sg3">';
    h+=statCell("Tile Zone",f2(c.tileOL*c.tileOW),"m²",f2(c.tileOL)+"m × "+f2(c.tileOW)+"m","");
    h+=statCell("Concrete Area",f2(c.concArea),"m²",f2(c.concOL)+"m × "+f2(c.concOW)+"m outer","cn");
    h+=S.sep?statCell("Separate Pour","$1,200","","One-off flat charge","wn"):statCell("Pour Fee","$0","","Same height — no charge","");
    h+='</div><div class="m4">';
    h+=miniCell("Deep End",S.conc.deep,c.cSides.deep,"cn");
    h+=miniCell("Shallow End",S.conc.shallow,c.cSides.shallow,"cn");
    h+=miniCell("Side A",S.conc.sideA,c.cSides.sideA,"cn");
    h+=miniCell("Side B",S.conc.sideB,c.cSides.sideB,"cn");
    h+='</div></div></div>';
  }

  /* ── quote summary ── */
  h+='<div class="card"><div class="pad">'+sh("Quote Summary",'<span class="sh-g">All prices inc. GST</span>');
  h+='<div class="qs-items" style="grid-template-columns:'+iCols+'">'+items.join('')+'</div>';
  h+='<div class="qs-total"><div><div class="qt-label">Total (inc. GST)</div><div class="qt-detail">'+tParts.join("<br>")+'</div></div>';
  h+='<div class="qt-val">$'+aud(c.total)+'</div></div></div></div>';

  /* ── formula trace ── */
  h+='<div class="card"><div class="pad" style="padding-bottom:0">'+sh("Formula Trace")+'</div><div class="trace">';
  h+='Waterline: <b>'+S.poolL+' × '+S.poolW+' = '+f2(c.watArea)+' m²</b><br>';
  h+='Coping outer: <b>'+f2(c.copOL)+' × '+f2(c.copOW)+'</b> → coping area <b>'+f2(c.copArea)+' m²</b><br>';
  h+='Tile outer: <b>'+f2(c.tileOL)+' × '+f2(c.tileOW)+' = '+f2(c.tileOL*c.tileOW)+' m²</b><br>';
  h+='<span class="th">Tile area: '+f2(c.tileOL*c.tileOW)+' − '+f2(c.copOL*c.copOW)+' = '+f2(c.tileArea)+' m² × $'+RATES.tile+' = $'+aud(c.tileCharge)+'</span>';
  if(c.hasConc) h+='<br>Concrete outer: <b>'+f2(c.concOL)+' × '+f2(c.concOW)+' = '+f2(c.concOL*c.concOW)+' m²</b><br>'
    +'<span class="tc">Concrete: '+f2(c.concOL*c.concOW)+' − '+f2(c.tileOL*c.tileOW)+' = '+f2(c.concArea)+' m² × $'+RATES.conc+' = $'+aud(c.concCharge)+'</span>';
  if(c.hasConc&&S.sep) h+='<br><span class="tw">Separate pour: $1,200.00 (one-off)</span>';
  if(S.pump) h+='<br><span class="tw">Concrete pump: $1,200.00 (one-off)</span>';
  h+='<br><span class="th" style="font-size:13px">TOTAL (inc. GST):  $'+aud(c.total)+'</span></div></div>';

  h+='<div class="no-print" style="text-align:center;color:var(--tx3);font-size:10px;padding:4px 0;letter-spacing:.04em">Print or Save as PDF to share with client</div>';
  document.getElementById("app").innerHTML=h;
}

/* ── events ── */
document.addEventListener("click",function(e){
  var bump=e.target.closest("[data-bump]");
  if(bump){
    var p=bump.dataset.bump.split(":"),path=p[0],d=parseFloat(p[1]);
    var ks=path.split("."),o=S;
    for(var i=0;i<ks.length-1;i++) o=o[ks[i]];
    o[ks[ks.length-1]]=Math.round(Math.max(0,Math.min(10,o[ks[ks.length-1]]+d))*10)/10;
    render();return;
  }
  var tg=e.target.closest("[data-tog]");
  if(tg){
    var v=tg.dataset.tog;
    if(v.indexOf("sep:")===0){S.sep=(v==="sep:true");render();}
    else if(v.indexOf("pump:")===0){S.pump=(v==="pump:true");render();}
    return;
  }
  var ab=e.target.closest("[data-action]");
  if(ab){
    var a=ab.dataset.action;
    if(a==="print") window.print();
    else if(a==="new") newQuote();
  }
});

/* number inputs: update S on keystroke but only re-render on blur/enter */
document.addEventListener("input",function(e){
  if(e.target.dataset.num) S[e.target.dataset.num]=parseFloat(e.target.value)||0;
});
document.addEventListener("change",function(e){
  if(e.target.dataset.num){S[e.target.dataset.num]=parseFloat(e.target.value)||0;render();}
});

function newQuote(){
  if(!confirm("Start a new quote? Unsaved changes will be lost."))return;
  S={poolL:7.3,poolW:3.6,copingW:0.4,
    tile:{deep:0,shallow:0,sideA:0,sideB:0},
    conc:{deep:0,shallow:0,sideA:0,sideB:0},sep:false,pump:false};
  render();
}
render();
</script>

  });
