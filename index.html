<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paradise Pools — Tile & Concrete Calculator</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#07111b">

<!-- iOS install support -->
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tile Calc">

<!-- Standard favicon -->
<link rel="icon" type="image/png" href="icon-192.png">
<style>
:root {
  --bg:#07111b; --p1:#0c1e2e; --p2:#112335; --p3:#172c40;
  --bd:#1c3450; --bd2:#254870;
  --water:#1778c0; --whi:#3ca4ec; --good:#18c484; --warn:#df9a16;
  --cop:#c2b28a; --conc:#9a7550;
  --white:#e8f2fc; --mid:#5e84a2; --dim:#2e4560;
  --sans:system-ui,-apple-system,"Segoe UI",sans-serif;
  --mono:ui-monospace,"Cascadia Code","SF Mono",Consolas,monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;}
body{
  min-height:100vh;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 1000px 600px at 80% -10%,#0d2d48 0%,transparent 55%),
    radial-gradient(circle at 1.5px 1.5px,#111f2e 1px,transparent 0);
  background-size:auto,22px 22px;
  color:var(--white);
  font-family:var(--sans);
  -webkit-font-smoothing:antialiased;
  padding:20px 22px 50px;
}
.wrap{max-width:1280px;margin:0 auto;display:flex;flex-direction:column;gap:14px;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;border-bottom:1px solid var(--bd);}
.logo{display:flex;align-items:center;gap:14px;}
.logo-icon{width:42px;height:42px;border-radius:11px;flex-shrink:0;background:linear-gradient(145deg,#1778c0,#0d4f8a);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(23,120,192,.4);}
.logo-icon svg{width:23px;height:23px;fill:none;stroke:#fff;stroke-width:1.8;}
.brand-eye{font-size:9px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:var(--mid);margin-bottom:3px;}
.brand-name{font-size:19px;font-weight:700;letter-spacing:-.02em;line-height:1;}
.topbar-btns{display:flex;gap:8px;flex-shrink:0;}
.btn{font-family:var(--sans);cursor:pointer;border:1px solid var(--bd2);background:var(--p2);color:var(--mid);border-radius:9px;padding:9px 15px;font-size:12px;font-weight:700;letter-spacing:.03em;display:inline-flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap;}
.btn:hover{border-color:var(--whi);color:var(--white);background:var(--p3);}
.btn svg{width:13px;height:13px;flex-shrink:0;}
.btn-primary{background:var(--water);border-color:var(--water);color:#fff;}
.btn-primary:hover{background:var(--whi);border-color:var(--whi);}
.panel{background:var(--p1);border:1px solid var(--bd);border-radius:14px;overflow:hidden;}
.pb{padding:16px 20px;}
.pb+.pb{border-top:1px solid var(--bd);}
.sl{display:flex;align-items:baseline;justify-content:space-between;gap:8px;font-size:9px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--mid);margin-bottom:13px;}
.sl .r{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--whi);}
.sl .g{color:var(--good);font-weight:700;}
.sl .w{color:var(--warn);font-weight:700;}
.f{margin-bottom:11px;}
.f:last-child{margin-bottom:0;}
.fl{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--mid);margin-bottom:5px;}
.fh{font-size:9px;color:var(--dim);margin-top:3px;}
input[type=number],input[type=text]{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:7px;color:var(--white);font-size:14px;font-weight:600;padding:8px 11px;outline:none;font-family:var(--sans);transition:border-color .15s;}
input:focus{border-color:var(--water);box-shadow:0 0 0 3px rgba(23,120,192,.14);}
.spin{display:flex;border:1px solid var(--bd);border-radius:8px;overflow:hidden;height:38px;}
.sb{min-width:38px;background:var(--p3);border:none;color:var(--mid);font-size:20px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0;}
.sb:hover{background:var(--bd2);color:var(--white);}
.sv{flex:1;min-width:32px;text-align:center;font-family:var(--mono);font-weight:800;font-size:16px;color:var(--whi);background:var(--bg);border-left:1px solid var(--bd);border-right:1px solid var(--bd);display:flex;align-items:center;justify-content:center;}
.tog{border:1px solid var(--bd);border-radius:9px;background:var(--bg);padding:10px 13px;cursor:pointer;margin-bottom:8px;transition:all .15s;user-select:none;}
.tog:last-of-type{margin-bottom:0;}
.tog:hover{border-color:var(--bd2);background:var(--p2);}
.tog.on{border-color:var(--water);background:#0a2640;}
.tog.off{opacity:.32;pointer-events:none;}
.tt{font-size:12px;font-weight:600;color:var(--mid);line-height:1.3;}
.tog.on .tt{color:var(--whi);}
.ts{font-size:10px;color:var(--dim);margin-top:3px;}
.main-layout{display:grid;grid-template-columns:360px 1fr;gap:14px;align-items:start;}
.left-col{display:flex;flex-direction:column;gap:14px;}
.diag-head{padding:13px 20px 8px;font-size:9px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--mid);}
svg.pool{display:block;width:100%;height:auto;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.j4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.sg{display:grid;gap:1px;background:var(--bd);border-radius:11px;overflow:hidden;}
.sg3{grid-template-columns:repeat(3,1fr);}
.sg4{grid-template-columns:repeat(4,1fr);}
.sc{background:var(--p1);padding:12px 15px;}
.scl{font-size:8.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mid);margin-bottom:4px;}
.scv{font-size:20px;font-weight:800;font-family:var(--mono);line-height:1;color:var(--white);}
.scv .u{font-size:10px;font-weight:500;color:var(--mid);margin-left:3px;}
.scs{font-size:10px;color:var(--dim);margin-top:4px;}
.hi{color:var(--whi)!important;}
.co{color:var(--cop)!important;}
.cn{color:#b08860!important;}
.wn{color:var(--warn)!important;}
.m4{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bd);border-radius:9px;overflow:hidden;margin-top:10px;}
.mc{background:var(--p1);padding:10px 13px;}
.mcl{font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);}
.mcv{font-size:17px;font-weight:800;font-family:var(--mono);margin-top:2px;}
.mcv .u{font-size:9px;font-weight:500;color:var(--mid);margin-left:2px;}
.mcs{font-size:10px;color:var(--mid);}
.mco{font-size:9px;color:var(--dim);}
.qs-items{display:grid;gap:1px;background:var(--bd);border-radius:11px 11px 0 0;overflow:hidden;}
.qs-total{background:#091f34;border:1px solid var(--water);border-top:2px solid var(--water);border-radius:0 0 11px 11px;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.qt-label{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--whi);}
.qt-detail{font-size:11px;color:var(--mid);font-family:var(--mono);margin-top:3px;}
.qt-val{font-size:32px;font-weight:800;font-family:var(--mono);color:var(--whi);line-height:1;}
.qi{background:var(--p1);padding:14px 18px;}
.qil{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--mid);margin-bottom:4px;}
.qid{font-size:10px;color:var(--dim);font-family:var(--mono);margin-bottom:5px;}
.qiv{font-size:20px;font-weight:800;font-family:var(--mono);line-height:1;}
.savebar{display:flex;align-items:center;gap:9px;flex-wrap:wrap;padding:11px 20px;background:var(--p2);border-bottom:1px solid var(--bd);}

.save-tag{font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--mid);}
.save-ct{font-size:10px;color:var(--dim);margin-left:auto;}
.trace{font-family:var(--mono);font-size:11.5px;color:var(--mid);line-height:2.1;padding:15px 20px;background:var(--bg);border-top:1px solid var(--bd);}
.trace b{color:var(--white);font-weight:600;}
.th{color:var(--whi);font-weight:700;}
.tc{color:#b08860;font-weight:700;}
.tw{color:var(--warn);font-weight:700;}
@media print{
  body{background:#fff;color:#000;padding:0;background-image:none;}
  .no-print{display:none!important;}
  .panel,.sc,.mc,.qi,.qs-total,.trace{background:#fff!important;border-color:#ccc!important;break-inside:avoid;}
  .scv,.qiv,.qt-val,.mcv,.brand-name{color:#000!important;}
  .hi,.qt-val{color:#0055bb!important;}
  .co{color:#7a6040!important;} .cn{color:#6b4828!important;} .wn{color:#a07000!important;}
  .qs-total{background:#e8f2ff!important;border-color:#0055bb!important;}
  .logo-icon{background:#0055bb!important;}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
@media(max-width:900px){
  .main-layout{grid-template-columns:1fr;}
  .left-col{order:2;} .right-col{order:1;}
  .j4{grid-template-columns:1fr 1fr;}
}
@media(max-width:520px){
  body{padding:12px 12px 40px;}
  .j4,.g2{grid-template-columns:1fr;}
  .topbar{flex-wrap:wrap;gap:10px;}
}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
var ROW_W=0.4;
var RATES={tile:470,conc:220,pour:1200,pump:1200};
function f2(n){return n.toFixed(2);}
function aud(n){return n.toLocaleString("en-AU",{minimumFractionDigits:2,maximumFractionDigits:2});}

var S={
  job:{customer:"",address:"",ref:"",date:new Date().toISOString().slice(0,10)},
  poolL:7.3,poolW:3.6,copingW:0.4,
  tile:{deep:1,shallow:4,sideA:1,sideB:1},
  conc:{deep:0,shallow:0,sideA:0,sideB:0},
  sep:false,pump:false
};

function calc(){
  var poolL=S.poolL,poolW=S.poolW,copingW=S.copingW,tile=S.tile,conc=S.conc;
  var watArea=poolL*poolW;
  var copOL=poolL+copingW*2,copOW=poolW+copingW*2;
  var copArea=copOL*copOW-watArea;
  var tD=tile.deep*ROW_W,tS=tile.shallow*ROW_W,tA=tile.sideA*ROW_W,tB=tile.sideB*ROW_W;
  var tileOL=copOL+tD+tS,tileOW=copOW+tA+tB;
  var tileArea=tileOL*tileOW-copOL*copOW;
  var cD=conc.deep*ROW_W,cS=conc.shallow*ROW_W,cA=conc.sideA*ROW_W,cB=conc.sideB*ROW_W;
  var concOL=tileOL+cD+cS,concOW=tileOW+cA+cB;
  var hasConc=conc.deep+conc.shallow+conc.sideA+conc.sideB>0;
  var concArea=hasConc?concOL*concOW-tileOL*tileOW:0;
  var tileCharge=tileArea*RATES.tile;
  var concCharge=concArea*RATES.conc;
  var pourFee=hasConc&&S.sep?RATES.pour:0;
  var pumpFee=S.pump?RATES.pump:0;
  var total=tileCharge+concCharge+pourFee+pumpFee;
  var tileSides={
    deep:tile.deep*ROW_W*tileOW,shallow:tile.shallow*ROW_W*tileOW,
    sideA:tile.sideA*ROW_W*copOL,sideB:tile.sideB*ROW_W*copOL
  };
  var concSides={
    deep:conc.deep*ROW_W*concOW,shallow:conc.shallow*ROW_W*concOW,
    sideA:conc.sideA*ROW_W*tileOL,sideB:conc.sideB*ROW_W*tileOL
  };
  return{watArea:watArea,copOL:copOL,copOW:copOW,copArea:copArea,
    tD:tD,tS:tS,tA:tA,tB:tB,tileOL:tileOL,tileOW:tileOW,tileArea:tileArea,
    cD:cD,cS:cS,cA:cA,cB:cB,concOL:concOL,concOW:concOW,concArea:concArea,
    hasConc:hasConc,tileCharge:tileCharge,concCharge:concCharge,
    pourFee:pourFee,pumpFee:pumpFee,total:total,
    tileSides:tileSides,concSides:concSides};
}

function diagram(c){
  var W=760,H=420,PAD=28;
  var poolL=S.poolL,poolW=S.poolW,copingW=S.copingW,tile=S.tile,conc=S.conc;
  var outerL=c.concOL,outerW=c.concOW;
  var sc=Math.min((W-PAD*2)/outerL,(H-PAD*2)/outerW);
  var ox=(W-outerL*sc)/2,oy=(H-outerW*sc)/2;
  function R(rx,ry,rw,rh){return 'x="'+f2(ox+rx*sc)+'" y="'+f2(oy+ry*sc)+'" width="'+f2(rw*sc)+'" height="'+f2(rh*sc)+'"';}
  function CX(rx,rw){return f2(ox+(rx+rw/2)*sc);}
  function CY(ry,rh){return f2(oy+(ry+rh/2)*sc);}
  var oTX=c.cD,oTY=c.cA,oCX=c.cD+c.tD,oCY=c.cA+c.tA,oPX=oCX+copingW,oPY=oCY+copingW;
  var TC=["#1050a0","#1560ba","#1870d0","#2080e0","#3898f0"];
  var KC=["#4a3028","#5a3c30","#6a4838","#7a5448","#8a6858"];
  function fs(n){return Math.max(9,Math.min(13,n));}
  var s="";
  var i;
  for(i=0;i<conc.deep;i++)    s+='<rect '+R(i*ROW_W,0,ROW_W,outerW)+' fill="'+KC[i%5]+'" opacity=".9"/>';
  for(i=0;i<conc.shallow;i++) s+='<rect '+R(c.cD+c.tileOL+i*ROW_W,0,ROW_W,outerW)+' fill="'+KC[i%5]+'" opacity=".9"/>';
  for(i=0;i<conc.sideA;i++)   s+='<rect '+R(c.cD,i*ROW_W,c.tileOL,ROW_W)+' fill="'+KC[i%5]+'" opacity=".9"/>';
  for(i=0;i<conc.sideB;i++)   s+='<rect '+R(c.cD,c.cA+c.tileOW+i*ROW_W,c.tileOL,ROW_W)+' fill="'+KC[i%5]+'" opacity=".9"/>';
  for(i=0;i<tile.deep;i++)    s+='<rect '+R(oTX+i*ROW_W,oTY,ROW_W,c.tileOW)+' fill="'+TC[i%5]+'" opacity=".92"/>';
  for(i=0;i<tile.shallow;i++) s+='<rect '+R(oTX+c.tD+c.copOL+i*ROW_W,oTY,ROW_W,c.tileOW)+' fill="'+TC[i%5]+'" opacity=".92"/>';
  for(i=0;i<tile.sideA;i++)   s+='<rect '+R(oCX,oTY+i*ROW_W,c.copOL,ROW_W)+' fill="'+TC[i%5]+'" opacity=".92"/>';
  for(i=0;i<tile.sideB;i++)   s+='<rect '+R(oCX,oTY+c.tA+c.copOW+i*ROW_W,c.copOL,ROW_W)+' fill="'+TC[i%5]+'" opacity=".92"/>';
  s+='<rect '+R(oCX,oCY,c.copOL,c.copOW)+' fill="url(#cop)" filter="url(#sh)"/>';
  s+='<rect '+R(oCX,oCY,c.copOL,c.copOW)+' fill="none" stroke="#9a8060" stroke-width="1"/>';
  s+='<rect '+R(oPX,oPY,poolL,poolW)+' fill="url(#wat)"/>';
  s+='<rect '+R(oPX,oPY,poolL,poolW)+' fill="none" stroke="#48a8e0" stroke-width="1.5"/>';
  if(tile.deep+tile.shallow+tile.sideA+tile.sideB>0)
    s+='<rect '+R(oTX,oTY,c.tileOL,c.tileOW)+' fill="none" stroke="#3888e0" stroke-width="1" stroke-dasharray="5 3" opacity=".45"/>';
  if(c.hasConc)
    s+='<rect '+R(0,0,outerL,outerW)+' fill="none" stroke="#886040" stroke-width="1" stroke-dasharray="5 3" opacity=".45"/>';
  var pw=poolL*sc;
  if(pw>50){
    s+='<text x="'+CX(oPX,poolL)+'" y="'+f2(oy+oPY*sc+poolW*sc/2-8)+'" text-anchor="middle" fill="#fff" font-size="'+fs(pw/5.5)+'" font-weight="700" font-family="monospace" opacity=".9">POOL WATERLINE</text>';
    s+='<text x="'+CX(oPX,poolL)+'" y="'+f2(oy+oPY*sc+poolW*sc/2+10)+'" text-anchor="middle" fill="#9dd0f5" font-size="'+fs(pw/7.5)+'" font-family="monospace" opacity=".7">'+poolL+'m x '+poolW+'m</text>';
  }
  s+='<text x="'+f2(ox+oCX*sc+7)+'" y="'+f2(oy+oCY*sc+13)+'" fill="#7a6040" font-size="9" font-family="monospace" font-weight="700">COPING - INCL.</text>';
  function lbl(show,x,y,t,rot,col){
    if(!show)return"";
    return'<text x="'+x+'" y="'+y+'" text-anchor="middle" fill="'+(col||"#fff")+'" font-size="10" font-family="monospace" font-weight="700" opacity=".9"'+(rot?' transform="rotate(-90,'+x+','+y+')"':"")+'>'+t+'</text>';
  }
  s+=lbl(tile.deep>0,   CX(oTX,c.tD),                    CY(oTY,c.tileOW),          "DEEP . "+tile.deep+"R",   true);
  s+=lbl(tile.shallow>0,CX(oTX+c.tD+c.copOL,c.tS),       CY(oTY,c.tileOW),          "SHAL . "+tile.shallow+"R",true);
  s+=lbl(tile.sideA>0,  CX(oCX,c.copOL),                  CY(oTY,c.tA),              "SIDE A . "+tile.sideA+"R");
  s+=lbl(tile.sideB>0,  CX(oCX,c.copOL),                  CY(oTY+c.tA+c.copOW,c.tB),"SIDE B . "+tile.sideB+"R");
  s+=lbl(conc.deep>0,   CX(0,c.cD),                       CY(0,outerW),              "C-DEEP . "+conc.deep+"R", true,"#d0c0b0");
  s+=lbl(conc.shallow>0,CX(c.cD+c.tileOL,c.cS),           CY(0,outerW),              "C-SHAL . "+conc.shallow+"R",true,"#d0c0b0");
  s+=lbl(conc.sideA>0,  CX(c.cD,c.tileOL),                CY(0,c.cA),                "C-SIDE A . "+conc.sideA+"R",false,"#d0c0b0");
  s+=lbl(conc.sideB>0,  CX(c.cD,c.tileOL),                CY(c.cA+c.tileOW,c.cB),   "C-SIDE B . "+conc.sideB+"R",false,"#d0c0b0");
  var leg=[["#c2b28a","Coping (incl.)"],["#2080e0","Tile $470/m2"],["#7a5448","Concrete $220/m2"],["#1a5a8a","Waterline"]];
  for(i=0;i<leg.length;i++){
    s+='<g transform="translate('+(W-155)+','+(H-78+i*18)+')">';
    s+='<rect width="11" height="11" rx="2" fill="'+leg[i][0]+'"/>';
    s+='<text x="16" y="10" fill="#5e84a2" font-size="10" font-family="monospace">'+leg[i][1]+'</text></g>';
  }
  return '<svg class="pool" viewBox="0 0 '+W+' '+H+'">'
    +'<defs>'
    +'<pattern id="wat" patternUnits="userSpaceOnUse" width="20" height="20" patternTransform="rotate(30)">'
    +'<rect width="20" height="20" fill="#194e80"/>'
    +'<line x1="0" y1="10" x2="20" y2="10" stroke="#2878c0" stroke-width="1.5" opacity=".4"/>'
    +'</pattern>'
    +'<pattern id="cop" patternUnits="userSpaceOnUse" width="12" height="12">'
    +'<rect width="12" height="12" fill="#c2b28a"/>'
    +'<rect width="6" height="6" fill="#a08a60" opacity=".3"/>'
    +'<rect x="6" y="6" width="6" height="6" fill="#a08a60" opacity=".3"/>'
    +'</pattern>'
    +'<pattern id="dg" patternUnits="userSpaceOnUse" width="22" height="22">'
    +'<circle cx="1" cy="1" r=".7" fill="#101e2c"/>'
    +'</pattern>'
    +'<filter id="sh" x="-5%" y="-5%" width="110%" height="110%">'
    +'<feDropShadow dx="0" dy="1" stdDeviation="3" flood-opacity=".3"/>'
    +'</filter>'
    +'</defs>'
    +'<rect width="'+W+'" height="'+H+'" fill="#07111b" rx="10"/>'
    +'<rect width="'+W+'" height="'+H+'" fill="url(#dg)" rx="10" opacity=".6"/>'
    +s+'</svg>';
}

function spinH(path){
  var parts=path.split(".");
  var v=S;
  for(var i=0;i<parts.length;i++)v=v[parts[i]];
  return '<div class="spin">'
    +'<button class="sb" data-bump="'+path+':-1">&#8722;</button>'
    +'<div class="sv">'+v+'</div>'
    +'<button class="sb" data-bump="'+path+':1">+</button>'
    +'</div>';
}
function fld(label,inner,hint){
  return '<div class="f"><div class="fl">'+label+'</div>'+inner+(hint?'<div class="fh">'+hint+'</div>':'')+'</div>';
}
function statCell(label,val,unit,sub,cls){
  return '<div class="sc"><div class="scl">'+label+'</div>'
    +'<div class="scv '+(cls||'')+'">'+''+val+'<span class="u">'+unit+'</span></div>'
    +(sub?'<div class="scs">'+sub+'</div>':'')+'</div>';
}
function miniCell(label,rows,area,cls){
  return '<div class="mc"><div class="mcl">'+label+'</div>'
    +'<div class="mcv '+(cls||'')+'">'+''+rows+'<span class="u">rows</span></div>'
    +'<div class="mcs">'+f2(area)+' m2</div>'
    +'<div class="mco">'+(rows*400)+'mm out</div></div>';
}
function tog(label,sub,on,key){

document.addEventListener("click",function(e){
  var sb=e.target.closest("[data-bump]");
  if(sb){
    var parts=sb.dataset.bump.split(":");
    var path=parts[0],d=parseInt(parts[1]);
    var ks=path.split(".");
    var o=S;
    for(var i=0;i<ks.length-1;i++)o=o[ks[i]];
    var last=ks[ks.length-1];
    o[last]=Math.max(0,Math.min(10,o[last]+d));
    render();return;
  }
  var tg=e.target.closest("[data-tog]");
  if(tg){
    var v=tg.dataset.tog;
    if(v.indexOf("sep:")===0){S.sep=(v==="sep:true");render();}
    else if(v.indexOf("pump:")===0){S.pump=(v==="pump:true");render();}
    return;
  }
  var ab=e.target.closest("[data-action]");
  if(ab){
    var a=ab.dataset.action;
    if(a==="print")window.print();
    else if(a==="save")saveQuote();
    else if(a==="new")newQuote();
  }
});

document.addEventListener("change",function(e){
  if(e.target.id==="fileInput"&&e.target.files&&e.target.files[0]){
    loadQuoteFromFile(e.target.files[0]);
  }
});

document.addEventListener("input",function(e){
  if(e.target.dataset.num){S[e.target.dataset.num]=parseFloat(e.target.value)||0;render();}
  else if(e.target.dataset.job){S.job[e.target.dataset.job]=e.target.value;}
});

function saveQuote(){
  var name=S.job.ref||S.job.customer||("Quote-"+new Date().toLocaleDateString("en-AU").replace(/\//g,"-"));
  var data=JSON.stringify(S,null,2);
  var blob=new Blob([data],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;
  a.download=name+".json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function loadQuoteFromFile(file){
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(data&&data.poolL){S=data;render();alert("Loaded: "+file.name);}
      else{alert("Invalid quote file.");}
    }catch(x){alert("Could not read file.");}
  };
  reader.readAsText(file);
}
function newQuote(){
  if(!confirm("Start a new quote? Unsaved changes will be lost."))return;
  S={job:{customer:"",address:"",ref:"",date:new Date().toISOString().slice(0,10)},
    poolL:7.3,poolW:3.6,copingW:0.4,
    tile:{deep:1,shallow:4,sideA:1,sideB:1},
    conc:{deep:0,shallow:0,sideA:0,sideB:0},
    sep:false,pump:false};
  render();
}
